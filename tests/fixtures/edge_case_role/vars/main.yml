---
# title: Edge-case Role Runtime Variables
# description: Variables that are set at runtime and override defaults

# Computed install path — intentionally a variable, not a default
app_install_dir: "/opt/{{ app_name }}/{{ app_version }}"

# OS-specific package manager flags
pkg_install_flags:
  - "--no-install-recommends"
  - "--quiet"

# Internal list built from defaults — not meant to be overridden by operators
_resolved_db_url: "postgresql://{{ db_host }}:{{ db_port }}/{{ db_name }}"

# Feature matrix used by templates
feature_matrix:
  cache:
    backend: redis
    ttl: 300
  search:
    backend: elasticsearch
    index_prefix: "{{ app_name }}_"
