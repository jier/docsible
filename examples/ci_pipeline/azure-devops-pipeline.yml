trigger:
  branches:
    include:
      - main

pr:
  branches:
    include:
      - "*"

pool:
  vmImage: ubuntu-latest

stages:
  - stage: Validate
    displayName: Validate documentation
    jobs:
      - job: DocsibleCheck
        displayName: Check role documentation quality
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"
          - script: pip install docsible
            displayName: Install docsible
          - script: docsible validate role --role . --fail-on critical
            displayName: Validate documentation

  - stage: Document
    displayName: Generate documentation
    dependsOn: Validate
    condition: and(succeeded(), eq(variables['Build.SourceBranch'], 'refs/heads/main'))
    jobs:
      - job: DocsibleGenerate
        displayName: Generate README
        steps:
          - task: UsePythonVersion@0
            inputs:
              versionSpec: "3.12"
          - script: pip install docsible
            displayName: Install docsible
          - script: docsible document role --role . --no-backup
            displayName: Generate documentation
          - task: PublishPipelineArtifact@1
            inputs:
              targetPath: README.md
              artifact: documentation
            displayName: Publish README artifact
