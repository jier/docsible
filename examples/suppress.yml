# Example .docsible/suppress.yml
#
# This file silences specific docsible recommendations that your team has
# reviewed and intentionally accepted. Place it at:
#   <role-root>/.docsible/suppress.yml
#
# Manage rules with the CLI:
#   docsible suppress add --pattern "text" --reason "why"
#   docsible suppress list
#   docsible suppress remove <id>
#   docsible suppress clean        # remove expired or never-matched rules

rules:
  # ── Basic substring match ──────────────────────────────────────────────────
  - id: no-meta-file
    pattern: "meta/main.yml"
    reason: >
      This role is embedded in a monorepo; the meta file is maintained at the
      collection level. Accepted by the platform team.
    created_at: "2026-01-15T09:00:00+00:00"
    approved_by: platform-team

  # ── Scoped to a specific task file ────────────────────────────────────────
  - id: vault-bootstrap-creds
    pattern: "hardcoded credential"
    reason: >
      bootstrap.yml generates a temporary credential during initial provisioning.
      It is rotated immediately after setup. Reviewed in SEC-42.
    file_pattern: "tasks/bootstrap.yml"
    created_at: "2026-02-01T14:30:00+00:00"
    approved_by: security-team

  # ── Expiring rule (temporary suppression) ─────────────────────────────────
  - id: temp-skip-handlers
    pattern: "handler"
    reason: >
      Handler support is being added in sprint-12. Suppressed until 2026-06-01.
    expires_at: "2026-06-01T00:00:00+00:00"
    created_at: "2026-03-01T10:00:00+00:00"

  # ── Regex pattern match ────────────────────────────────────────────────────
  - id: legacy-var-names
    pattern: "^Variable .* does not follow"
    reason: >
      Legacy variable names kept for backward compatibility with existing
      playbooks. Will be renamed in the 3.0 release.
    use_regex: true
    created_at: "2026-01-20T08:00:00+00:00"
    approved_by: api-team
